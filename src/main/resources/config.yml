# SkGame configuration

# --- Modules ---
# Enable/disable user-facing components independently.
# Disabling a module prevents its Skript syntaxes, vanilla scripts, and listeners from loading.
modules:
  gui:
    enabled: true
  admin:
    enabled: true
  default-minigames:
    enabled: true
  region-skbee:
    enabled: true     # auto-skipped if SkBee is not installed
  region-worldguard:
    enabled: true     # auto-skipped if WorldGuard is not installed
  messages:
    enabled: true
  database:
    enabled: false
  scoreboard:
    enabled: false

# --- Lobby ---
# Set via /skgame setlobby or the `set lobby spawn to %location%` effect.
lobby:
  world: ~
  x: 0.0
  y: 0.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# --- Defaults ---
defaults:
  gamemode: adventure

# --- Messages ---
messages:
  forced-locale: ~        # null = use per-player locale
  fallback-locale: en_US
  hot-reload: true
