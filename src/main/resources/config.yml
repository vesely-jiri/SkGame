# SkGame configuration

# --- Debug ---
# Set to true to enable verbose per-subsystem debug logging (INFO level).
# Safe to leave on in production but noisy — disable unless diagnosing issues.
debug: false

# --- Update checker ---
update-checker:
  enabled: true

# --- Modules ---
# Enable/disable user-facing components independently.
# Disabling a module prevents its Skript syntaxes, vanilla scripts, and listeners from loading.
# NOTE: changes to modules.*.enabled require a full server restart (/skgame reload config does NOT re-enable/disable modules).
modules:
  gui:
    enabled: true
  admin:
    enabled: true
  default-minigames:
    enabled: true
  region-skbee:
    enabled: true     # auto-skipped if SkBee is not installed
  region-worldguard:
    enabled: true     # auto-skipped if WorldGuard is not installed
  messages:
    enabled: true
  database:
    enabled: false
  scoreboard:
    enabled: false

# --- Defaults ---
defaults:
  gamemode: adventure

# --- Session party ---
session:
  # Seconds of LOBBY inactivity before auto-disbanding the party. 0 = disabled.
  idle-disband-timeout: 1200
  # When true, the first LOBBY member (insertion order) becomes host if current host leaves.
  # When false, any host departure immediately disbands the party (HOST_LEAVE reason).
  auto-promote-host: true
  # When false (default), host cannot change minigame/map/rounds while game is STARTING or STARTED.
  allow-mid-game-changes: false
  # Post-game celebration window — players stay in arena after game ends. 0 = disabled (current behavior).
  post-game:
    window-seconds: 0
  # Rejoin offer after disconnect — shown to players who were mid-game when they disconnected.
  rejoin:
    enabled: true
    # How long (in seconds) the rejoin offer remains valid after disconnect.
    window-seconds: 60
  # PREPARATION window — team self-select, map voting, map preview before game start.
  # Only active for minigames that declare teams (Batch 4). Inactive in M1.
  preparation:
    window-seconds: 20
  # Chat isolation — restrict session members' chat to their own session.
  chat:
    isolation: false
    # When true, spectators only see spectator-side chat within the session.
    spectator-isolation: false
    # When true, pre-game (LOBBY) session members are isolated to their own session.
    # When false (default), pre-game members chat globally; isolation activates only once STARTED.
    isolate-lobby: false

# --- Spectate browser ---
spectate:
  # Default value of allow-spectate for new sessions (host can override per-session via GUI or Skript)
  default-allow: true
  # Permission node that bypasses a session's allow-spectate flag
  bypass-permission: skgame.spectate.bypass

# --- Spectators ---
spectators:
  # Gamemode applied when a player becomes a spectator.
  # Standard SPECTATOR recommended; CREATIVE works for staff-spectate scenarios.
  gamemode: SPECTATOR
  # Fallback when no spectator_spawn map value and no arena region center is available.
  # Only "lobby" is currently implemented. "reject" is not yet supported (see Phase 8 open questions).
  fallback-when-no-spawn: lobby

# --- Arena ---
arena:
  cleanup:
    # Remove all non-player entities from the arena region at game end.
    entities: true
    # Remove dropped item entities (subset; only applies when entities: false).
    dropped-items: true
    # Remove primed TNT entities (subset; only applies when entities: false).
    primed-tnt: true

# --- Storage ---
# Bundled SQLite native libraries cover:
#   64-bit Linux with glibc (most distros), 64-bit Linux with musl/Alpine,
#   64-bit Windows, macOS Intel (x86_64) and Apple Silicon (aarch64).
# NOT bundled: 32-bit Linux/Windows, FreeBSD, Android/Termux, PowerPC, Windows-on-ARM.
# On an unsupported platform the database module will log a SEVERE message and
# disable stats/leaderboards; all other minigame functionality continues normally.
storage:
  type: sqlite    # Supported: sqlite. Future: mysql, postgres.
  sqlite:
    file: skgame.db   # Relative to plugins/SkGame/storage/

# --- Quickplay ---
quickplay:
  enabled: true
  # Seconds to search for an existing public LOBBY session before creating a new one.
  search-window-seconds: 15
  # When true: create a new session after search window expires with no match.
  # When false: notify the player and remove them from the queue.
  create-on-no-match: true

# --- Messages ---
messages:
  forced-locale: ~        # null = use per-player locale
  fallback-locale: en_US
  hot-reload: true
  auto-merge: true        # append missing keys from bundled defaults to user YAML files on startup
