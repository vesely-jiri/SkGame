# SkGame — English (United States)
# ─────────────────────────────────────────────────────────────────────────────
# Format: legacy & color codes by default (e.g. &a = green, &c = red).
# Placeholder syntax: {0}, {1}, … (positional). Never use Skript %var% syntax.
#
# NOTE — visual decorations: entries such as separators ("&6---…"), bracket
# labels ("&a[&2+&a]"), and UI indicators are visual rather than linguistic.
# Translators may copy these verbatim if no language-specific change is needed.
#
# NOTE — item names and lore (admin.wand.*): resolved at server locale
# (forced-locale or en_US), not per-player, because item metadata is set once.
# ─────────────────────────────────────────────────────────────────────────────

