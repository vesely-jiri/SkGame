name: SkGame
version: ${version}
main: cz.nox.skgame.SkGame
description: Skript addon for managing minigames
api-version: 1.21
depend: [ Skript ]
softdepend: [ SkBee, WorldGuard ]

commands:
  skgame:
    description: SkGame admin commands
    usage: /skgame <reload|maintenance> [args]
  game:
    description: Open game menu or manage sessions
    usage: /game [admin|spectate <session-id>]

permissions:
  skgame.admin.reload:
    description: Reload SkGame subsystems
    default: op
  skgame.admin:
    description: Access the SkGame admin GUI
    default: op
  skgame.spectate:
    description: Join sessions as spectator via /game spectate
    default: op