name: SkGame
version: ${version}
main: cz.nox.skgame.SkGame
description: Skript addon for managing minigames
api-version: 1.21
depend: [ Skript ]
softdepend: [ SkBee, WorldGuard ]

commands:
  skgame:
    description: SkGame admin commands
    usage: /skgame <info|reload|maintenance|stats|panel> [args]
  game:
    description: Open game menu or manage sessions
    usage: /game [admin|spectate <session-id>]

permissions:
  skgame.admin.reload:
    description: Reload SkGame subsystems
    default: op
  skgame.admin:
    description: Access the SkGame admin GUI
    default: op
  skgame.spectate:
    description: Join sessions as spectator via /game spectate
    default: op
  skgame.profile:
    description: View own player profile via /game profile
    default: true
  skgame.profile.others:
    description: View other players' profiles via /game profile <name>
    default: op
  skgame.history.others:
    description: View other players' game history via /game history <name>
    default: op
  skgame.info:
    description: View SkGame server info via /skgame info
    default: true
  skgame.info.extended:
    description: View extended runtime/database info via /skgame info
    default: op