name: Build, Test & Upload Artifact

on:
  push:
    branches: [master, main, 'dev/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkGame-Artifact
          path: build/libs/SkGame*.jar

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v2
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: extra-plugins/
          merge-multiple: true
      - name: Run Skript tests
        uses: SkriptLang/skript-test-action@v1.3
        with:
          test_script_directory: src/test/scripts
          # master = latest Skript; SkGame targets 2.13.0 — bump to 2.15+ if API diverges
          skript_repo_ref: master
          extra_plugins_directory: extra-plugins/
          run_vanilla_tests: 'false'
